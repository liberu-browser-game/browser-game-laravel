apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: browser-game

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: browser-game
        namespace: browser-game
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: php-fpm
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "500m"
                  limits:
                    memory: "2Gi"
                    cpu: "2000m"
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: browser-game-config
        namespace: browser-game
      data:
        APP_ENV: "production"
        APP_DEBUG: "false"
        LOG_LEVEL: "error"
        MODULES_CACHE: "true"
