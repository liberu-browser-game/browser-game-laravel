apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: browser-game-dev

namePrefix: dev-

resources:
  - ../../base

patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: browser-game-config
        namespace: browser-game-dev
      data:
        APP_ENV: "local"
        APP_DEBUG: "true"
        APP_URL: "http://browser-game.local"
        LOG_LEVEL: "debug"
        MODULES_CACHE: "false"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: browser-game
        namespace: browser-game-dev
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: php-fpm
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "512Mi"
                    cpu: "500m"
  - patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: browser-game
        namespace: browser-game-dev
        annotations:
          nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      spec:
        ingressClassName: nginx
        rules:
          - host: browser-game.local
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: dev-browser-game
                      port:
                        number: 80
