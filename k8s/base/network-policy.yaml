apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: browser-game-network-policy
  namespace: browser-game
spec:
  podSelector:
    matchLabels:
      app: browser-game
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: mysql
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS for external OAuth providers
    - to: []
      ports:
        - protocol: TCP
          port: 443
