apiVersion: v1
kind: ConfigMap
metadata:
  name: browser-game-config
  namespace: browser-game
data:
  APP_NAME: "Liberu Browser Game"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://browser-game.example.com"
  LOG_CHANNEL: "stack"
  LOG_LEVEL: "error"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "liberu_game"
  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  BROADCAST_DRIVER: "reverb"
  FILESYSTEM_DISK: "local"
  OCTANE_SERVER: "roadrunner"
  MODULES_CACHE: "true"
