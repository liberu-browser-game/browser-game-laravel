apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: browser-game
  namespace: browser-game
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - browser-game.example.com
      secretName: browser-game-tls
  rules:
    - host: browser-game.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: browser-game
                port:
                  number: 80
